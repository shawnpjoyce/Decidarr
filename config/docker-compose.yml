name: decidarr
services:
  web:
    build:
      context: ..
      dockerfile: config/Dockerfile
    env_file:
      - ../.env
    environment:
      DB_PATH: /var/www/html/storage/app.sqlite
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ../storage:/var/www/html/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
